<!-- Footer partial with breadcrumb, links, socials, copyright, language toggle and theme switcher -->
<footer class="footer">
    <div class="footer__container">
        <!-- Breadcrumb navigation -->
        <div class="footer__breadcrumb">
            <a href="/" class="footer__breadcrumb-home">
                <img src="/img/logo.svg" alt="Logo" class="footer__breadcrumb-logo">
            </a>
            <span class="footer__breadcrumb-separator">></span>
            <span class="footer__breadcrumb-current">{{ .Title }}</span>
        </div>

        <div class="footer__content">
            <!-- Main navigation -->
            <div class="footer__nav">
                <h3 class="footer__heading">Navigazione</h3>
                <ul class="footer__list">
                    <li class="footer__list-item"><a href="/" class="footer__link">Home</a></li>
                    <li class="footer__list-item"><a href="/progetti" class="footer__link">Progetti</a></li>
                    <li class="footer__list-item"><a href="/blog" class="footer__link">Blog</a></li>
                    <li class="footer__list-item"><a href="/contattami" class="footer__link">Contattami</a></li>
                </ul>
            </div>

            <!-- Legal links -->
            <div class="footer__legal">
                <h3 class="footer__heading">Legale</h3>
                <ul class="footer__list">
                    <li class="footer__list-item"><a href="/privacy-policy" class="footer__link">Privacy Policy</a></li>
                    <li class="footer__list-item"><a href="/cookie-policy" class="footer__link">Cookie Policy</a></li>
                </ul>
            </div>

            <!-- Social links -->
            <div class="footer__social">
                <h3 class="footer__heading">Social</h3>
                <ul class="footer__list">
                    <li class="footer__list-item">
                        <a href="https://linkedin.com/in/your-linkedin" target="_blank" rel="noopener noreferrer" class="footer__link footer__link--external">
                            LinkedIn
                        </a>
                    </li>
                    <li class="footer__list-item">
                        <a href="https://github.com/your-github" target="_blank" rel="noopener noreferrer" class="footer__link footer__link--external">
                            GitHub
                        </a>
                    </li>
                    <li class="footer__list-item">
                        <a href="mailto:your-email@example.com" class="footer__link footer__link--external">
                            Email
                        </a>
                    </li>
                </ul>
            </div>
        </div>

        <div class="footer__bottom">
            <!-- Copyright notice -->
            <div class="footer__copyright">
                &copy; {{ now.Format "2006" }} Davide La Marca. Tutti i diritti riservati.
            </div>

            <!-- Preferences section for language and theme -->
            <div class="footer__preferences">
                <!-- Language toggle -->
                <div class="footer__language">
                    <a href="#" class="footer__language-option footer__language-option--active" data-lang="it">IT</a>
                    <span class="footer__language-separator">|</span>
                    <a href="#" class="footer__language-option" data-lang="en">EN</a>
                </div>

                <!-- Theme switcher -->
                <div class="footer__theme">
                    <button class="footer__theme-option" data-theme="light" title="Tema chiaro">
                        <span class="footer__theme-icon footer__theme-icon--light"></span>
                    </button>
                    <button class="footer__theme-option" data-theme="dark" title="Tema scuro">
                        <span class="footer__theme-icon footer__theme-icon--dark"></span>
                    </button>
                    <button class="footer__theme-option" data-theme="auto" title="Tema automatico">
                        <span class="footer__theme-icon footer__theme-icon--auto"></span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</footer>

<!-- Minimal script for toggling active state on language and theme buttons (without actual theme changing) -->
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Language toggle
        const langOptions = document.querySelectorAll('.footer__language-option');
        langOptions.forEach(option => {
            option.addEventListener('click', function(e) {
                e.preventDefault();
                langOptions.forEach(opt => opt.classList.remove('footer__language-option--active'));
                this.classList.add('footer__language-option--active');
            });
        });
        
        // Theme toggle - just for UI feedback, no actual theme change
        const themeOptions = document.querySelectorAll('.footer__theme-option');
        themeOptions.forEach(option => {
            option.addEventListener('click', function() {
                themeOptions.forEach(opt => opt.classList.remove('footer__theme-option--active'));
                this.classList.add('footer__theme-option--active');
            });
        });
    });
</script>
